sonar_node:
  ros__parameters:
    sonar_ip: "192.168.194.96"
    frame_id: "sonar_link"

    # Acoustics
    acoustics_enabled: true
    speed_of_sound: 1480.0
    # mode: "low-frequency" or "high-frequency" (requires firmware >= 1.7.0)
    mode: "low-frequency"
    # salinity: "salt" or "fresh" (requires firmware >= 1.7.0)
    salinity: "salt"
    range_min: 0.3
    range_max: 15.0

    # UDP streaming
    udp_mode: "multicast"
    # Only used when udp_mode is "unicast":
    unicast_destination_ip: ""
    unicast_destination_port: 0

    # Diagnostics timer period in seconds
    diagnostics_period: 5.0
